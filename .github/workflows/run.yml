name: Run Code
on:
  workflow_dispatch:

jobs:
  run-code:
    runs-on: ubuntu-latest
    steps:
      - name: Setup environment
        run: |
          sudo apt update -y
          sudo apt upgrade -y
          sudo apt install python3 python3-pip python3-venv python-is-python3 git -y
          python -m venv runner
          source runner/bin/activate
      - name: Install sympy
        run: pip install sympy
      - name: Clone repository
        run: git clone https://github.com/tc0512/MATH.git
      - name: Run code
        run: |
          cd MATH
          time python EXAM/week61-62.py
